<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe AI</h1>

        <div id="auth-section">
            <div class="form-box">
                <h2>Sign Up!</h2>
                <form id="register-form">
                    <input type="text" id="reg-username" placeholder="Choose a Username" required>
                    <input type="password" id="reg-password" placeholder="Choose a Password" required>
                    <button type="submit">Register</button>
                </form>
            </div>

            <div class="form-box">
                <h2>Log In</h2>
                <form id="login-form">
                    <input type="text" id="login-username" placeholder="Username" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit">Log In</button>
                </form>
            </div>
        </div>
    </div>
    <div id="game-section" style="display: none;">
            <h2 id="turn-indicator">Player X's Turn</h2>

            <div id="board" class="board">
                </div>
    <button id="reset-btn">Restart Game</button>

    <button id="history-btn" style="margin-top: 10px;">View Game History</button>
    <div id="history-section" style="display: none; margin-top: 20px;">
        <h3>Game History</h3>
        <ul id="history-list" style="list-style-type: none; padding: 0;"></ul>
    </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
